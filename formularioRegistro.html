<!doctype html>
<html lang="es">

<head>
    <title>Formulario de Registro - OfiTech</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,700;1,500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="scss/style.css">
</head>

<body>
<header>
    <nav class="ofitech-navbar ofitech-navbar--center">
        <a href="index.html" class="ofitech-navbar__logo text-decoration-none">
            <span class="ofitech-logo-ofi">Ofi</span>
            <span class="ofitech-logo-tech">Tech</span>
        </a>
    </nav>
</header>

<main class="ofitech-main container mt-5">
    <h1 class="section-title">Crear cuenta</h1>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-8">

                <div class="card shadow">
                    <div class="card-body p-4">

                        <h3 class="text-center mb-4">Ingrese sus datos</h3>

                        <form id="registroForm">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre</label>
                                <input id="nombre" type="text" class="form-control" placeholder="Ingrese su nombre" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Primer apellido</label>
                                    <input id="apellido1" type="text" class="form-control" placeholder="Ingrese su primer apellido" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Segundo apellido</label>
                                    <input id="apellido2" type="text" class="form-control" placeholder="Ingrese su segundo apellido">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Dirección de envío</label>
                                <textarea id="direccion" class="form-control" rows="3"
                                    placeholder="Ingrese su dirección de envío" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo</label>
                                <input id="correo" type="email" class="form-control"
                                    placeholder="ejemplo@correo.com" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Contraseña</label>
                                <input id="password" type="password" class="form-control"
                                    placeholder="Ingrese su contraseña" required minlength="8">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Confirmar contraseña</label>
                                <input id="confirmPassword" type="password" class="form-control"
                                    placeholder="Ingrese nuevamente su contraseña" required minlength="8">
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="categoria-btn">
                                    Crear cuenta
                                </button>
                            </div>

                            <a href="inicioSesion.html" class="d-block text-center mt-3">
                                ¿Ya tienes una cuenta? Inicia sesión
                            </a>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</main>

<div class="ofitech-spacer"></div>

<footer class="ofitech-footer">
    <div class="ofitech-footer__social">
        <a href="#" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
    </div>
    <div class="ofitech-footer__info">
        OFITECH DIGITAL SOLUTIONS, S.A<br>
        Cédula jurídica: 3101999899<br>
        Dirección: Barrio Francisco Peralta, sobre Avenida Central y Calle 33,<br>
        10104 San José, Provincia de San José, Costa Rica.<br>
        PBX: (506) 2222-2222
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
    crossorigin="anonymous"></script>

<script src="js/registro.js"></script>

</body>
</html>
